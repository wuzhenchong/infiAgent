# CheapClaw 默认 llm 配置样例。当前示例统一使用 Gemini 3 Flash。
temperature: 0
max_tokens: 0
max_context_window: 500000
base_url: https://openrouter.ai/api/v1
api_key:
timeout: 300
stream_timeout: 30
first_chunk_timeout: 30

tool_choice:
  execution: required
  thinking: required
  compressor: required
  image_generation: required
  read_figure: required

models:
  - name: openai/google/gemini-3-flash-preview
    default: true
    tool_choice: required
  - name: openai/moonshotai/kimi-k2.5
    tool_choice: auto
  - name: openai/qwen/qwen3.5-27b
    tool_choice: auto

figure_models:
  - name: openai/google/gemini-3-flash-preview
    default: true
    tool_choice: required
  - name: openai/moonshotai/kimi-k2.5
    tool_choice: auto
  - name: openai/qwen/qwen3.5-27b
    tool_choice: auto

compressor_models:
  - name: openai/google/gemini-3-flash-preview
    default: true
    tool_choice: required
  - name: openai/moonshotai/kimi-k2.5
    tool_choice: auto
  - name: openai/qwen/qwen3.5-27b
    tool_choice: auto

read_figure_models:
  - name: openai/google/gemini-3-flash-preview
    default: true
    tool_choice: required
  - name: openai/moonshotai/kimi-k2.5
    tool_choice: auto
  - name: openai/qwen/qwen3.5-27b
    tool_choice: auto

thinking_models:
  - name: openai/google/gemini-3-flash-preview
    default: true
    tool_choice: required
  - name: openai/moonshotai/kimi-k2.5
    tool_choice: auto
  - name: openai/qwen/qwen3.5-27b
    tool_choice: auto

multimodal: true
compressor_multimodal: true
